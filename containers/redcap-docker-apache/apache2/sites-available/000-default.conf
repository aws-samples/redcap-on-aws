# This will be set by set_redcap_version.sh during Docker build
Define REDCAP_VERSION __REDCAP_VERSION_PLACEHOLDER__

<VirtualHost *:80>
        DocumentRoot /var/www/html

        UseCanonicalName Off

        SetEnvIf X-Forwarded-Proto "https" HTTPS=on

        <Directory />
                AllowOverride none
                Require all denied
        </Directory>

        LogFormat "%h %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\"" combined
        LogFormat "%{X-Forwarded-For}i %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\"" proxy
        SetEnvIf X-Forwarded-For "^.*\..*\..*\..*" forwarded
        CustomLog /dev/stdout combined env=!forwarded
        CustomLog /dev/stdout proxy env=forwarded
        ErrorLog /dev/stdout

        <Directory /var/www/html>
                Options Indexes FollowSymLinks
                AllowOverride All
                Require all granted
        </Directory>

        <Files ".ht*">
                Require all denied
        </Files>

        RewriteEngine On
        LogLevel alert rewrite:trace3

        RewriteCond %{REQUEST_URI} ^/(redcap_v[0-9]+\.[0-9]+\.[0-9]+)/(.*)$
        RewriteCond %1 !^${REDCAP_VERSION}$
        # Use X-Forwarded-Proto if set, otherwise default to http
        RewriteCond %{HTTP:X-Forwarded-Proto} (https?)
        RewriteRule ^/(redcap_v[0-9]+\.[0-9]+\.[0-9]+)/(.*)$ %1://%{HTTP_HOST}/${REDCAP_VERSION}/$2 [R=302,L,QSA]

</VirtualHost>
